<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  .hook {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #fff;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .statement {
    width: 82%;
    text-align: center;
    font-size: 64px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -0.01em;
    transform: scale(0.9);
    opacity: 0;
  }
</style>
</head>
<body>
  <div class="hook">
    <div class="statement" id="statement"></div>
  </div>
  <script id="hf-data" type="application/json">{{DATA}}</script>
  <script>
    const data = JSON.parse(document.getElementById('hf-data').textContent);
    const el = document.getElementById('statement');
    el.textContent = data.copy;

    // No fade-out: per tiktok-raw-style.json, the hook card cuts straight
    // to raw footage rather than transitioning out.
    const inDur = data.inDurationSec ?? 0.2;

    window.hfSetTime = function (t) {
      const p = Math.min(1, t / inDur);
      el.style.opacity = String(p);
      el.style.transform = `scale(${0.9 + 0.1 * p})`;
    };
    window.hfSetTime(0);
  </script>
</body>
</html>
