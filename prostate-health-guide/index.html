<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scott M.'s Prostate Health Guide</title>
<meta name="description" content="A private, plain-language companion for organizing prostate cancer records and understanding treatment. Educational only — not medical advice.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#215a55">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prostate Guide">
<style>
/* ---------- Design tokens ---------- */
:root{
  --paper:#f5f7f6; --surface:#ffffff; --surface-2:#eef2f0;
  --ink:#1a2a29; --muted:#5c6d6b; --faint:#8a9997;
  --border:#dde4e1; --border-strong:#c7d1ce;
  --primary:#2f7d76; --primary-ink:#215a55; --primary-soft:#e3efed;
  --accent:#c47a4d; --accent-soft:#f6e9df;
  --good:#3f8f5f; --warn:#b5822a; --crit:#bd554a;
  --good-soft:#e4f0e8; --warn-soft:#f6ecd8; --crit-soft:#f6e2df;
  --shadow:0 1px 2px rgba(20,40,38,.05), 0 6px 20px rgba(20,40,38,.06);
  --radius:14px; --radius-sm:9px;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --maxw:1180px;
}
@media (prefers-color-scheme:dark){
  :root{
    --paper:#0e1817; --surface:#152220; --surface-2:#1b2b28;
    --ink:#e7efeb; --muted:#a2b3ae; --faint:#7d908b;
    --border:#26332f; --border-strong:#33433e;
    --primary:#63b8ad; --primary-ink:#8fd0c6; --primary-soft:#183330;
    --accent:#df9d6f; --accent-soft:#2c2117;
    --good:#5cae7b; --warn:#d3a24e; --crit:#e08074;
    --good-soft:#172c22; --warn-soft:#2c2413; --crit-soft:#2e1c19;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
}
:root[data-theme="light"]{
  --paper:#f5f7f6; --surface:#ffffff; --surface-2:#eef2f0;
  --ink:#1a2a29; --muted:#5c6d6b; --faint:#8a9997;
  --border:#dde4e1; --border-strong:#c7d1ce;
  --primary:#2f7d76; --primary-ink:#215a55; --primary-soft:#e3efed;
  --accent:#c47a4d; --accent-soft:#f6e9df;
  --good:#3f8f5f; --warn:#b5822a; --crit:#bd554a;
  --good-soft:#e4f0e8; --warn-soft:#f6ecd8; --crit-soft:#f6e2df;
  --shadow:0 1px 2px rgba(20,40,38,.05), 0 6px 20px rgba(20,40,38,.06);
}
:root[data-theme="dark"]{
  --paper:#0e1817; --surface:#152220; --surface-2:#1b2b28;
  --ink:#e7efeb; --muted:#a2b3ae; --faint:#7d908b;
  --border:#26332f; --border-strong:#33433e;
  --primary:#63b8ad; --primary-ink:#8fd0c6; --primary-soft:#183330;
  --accent:#df9d6f; --accent-soft:#2c2117;
  --good:#5cae7b; --warn:#d3a24e; --crit:#e08074;
  --good-soft:#172c22; --warn-soft:#2c2413; --crit-soft:#2e1c19;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
  font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;line-height:1.2;text-wrap:balance;margin:0}
a{color:var(--primary-ink);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px}

/* ---------- Shell ---------- */
.app{display:grid;grid-template-columns:264px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--surface);
  border-right:1px solid var(--border);padding:22px 16px;display:flex;flex-direction:column;gap:6px}
.brand{display:flex;gap:12px;align-items:flex-start;padding:6px 8px 16px}
.brand .mark{flex:0 0 auto;width:40px;height:40px;border-radius:11px;
  background:linear-gradient(150deg,var(--primary),var(--primary-ink));display:grid;place-items:center;
  color:#fff;font-family:var(--serif);font-size:20px;box-shadow:var(--shadow)}
.brand .who{font-size:12.5px;color:var(--muted);line-height:1.35}
.brand .who strong{display:block;font-family:var(--serif);font-size:15px;color:var(--ink);font-weight:600}
.navgroup{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);
  padding:14px 10px 4px;font-weight:600}
.navlink{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;color:var(--muted);
  font-size:14px;cursor:pointer;border:none;background:none;text-align:left;width:100%;transition:.15s}
.navlink:hover{background:var(--surface-2);color:var(--ink)}
.navlink.active{background:var(--primary-soft);color:var(--primary-ink);font-weight:600}
.navlink .ic{width:18px;text-align:center;flex:0 0 auto;opacity:.9}
.theme-toggle{margin-top:auto;display:flex;gap:8px;align-items:center;justify-content:space-between;
  padding:10px;border-top:1px solid var(--border);font-size:13px;color:var(--muted)}
.tbtn{border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);
  border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px}

/* ---------- Topbar (mobile) ---------- */
.topbar{display:none;position:sticky;top:0;z-index:30;background:var(--surface);
  border-bottom:1px solid var(--border);padding:10px 14px;align-items:center;gap:12px}
.hamb{border:1px solid var(--border-strong);background:var(--surface);border-radius:8px;
  width:38px;height:38px;font-size:18px;cursor:pointer;color:var(--ink)}
.scrim{display:none;position:fixed;inset:0;background:rgba(10,20,18,.45);z-index:40}

/* ---------- Main ---------- */
.main{min-width:0;padding:34px clamp(18px,4vw,56px) 90px;max-width:var(--maxw)}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:600}
.page-h{font-size:clamp(26px,3.6vw,36px);margin:6px 0 8px}
.lead{color:var(--muted);max-width:64ch;font-size:16.5px}
.section-gap{margin-top:26px}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 22px;box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(230px,1fr))}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:9px}
.ref-card h3{font-size:19px}
.ref-card .tag{font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
  font-weight:600}
.ref-card p{margin:0;color:var(--ink);font-size:14.5px;line-height:1.5}
.ref-card .metaphor{color:var(--muted);font-size:14px;border-left:3px solid var(--accent);
  padding-left:11px;font-style:italic;margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
  border-radius:999px;padding:3px 10px;border:1px solid var(--border-strong);color:var(--muted)}
.pill.good{background:var(--good-soft);color:var(--good);border-color:transparent}
.pill.warn{background:var(--warn-soft);color:var(--warn);border-color:transparent}
.pill.crit{background:var(--crit-soft);color:var(--crit);border-color:transparent}
.pill.info{background:var(--primary-soft);color:var(--primary-ink);border-color:transparent}

/* ---------- Listen button ---------- */
.listen{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;margin-top:4px;
  border:1px solid var(--border-strong);background:var(--surface-2);color:var(--ink);
  border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.listen:hover{border-color:var(--primary);color:var(--primary-ink)}
.listen.speaking{background:var(--primary);color:#fff;border-color:var(--primary)}
.listen .wave{display:inline-flex;gap:2px;align-items:flex-end;height:13px}
.listen .wave i{width:2.5px;background:currentColor;border-radius:2px;height:5px;animation:none}
.listen.speaking .wave i{animation:wv .9s infinite ease-in-out}
.listen.speaking .wave i:nth-child(2){animation-delay:.15s}
.listen.speaking .wave i:nth-child(3){animation-delay:.3s}
.listen.speaking .wave i:nth-child(4){animation-delay:.45s}
@keyframes wv{0%,100%{height:4px}50%{height:13px}}
@media (prefers-reduced-motion:reduce){.listen.speaking .wave i{animation:none;height:9px}}

/* ---------- Action items ---------- */
.actions{margin-top:8px}
details.actions-d{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2);
  padding:0;overflow:hidden}
details.actions-d>summary{cursor:pointer;padding:12px 16px;font-weight:600;font-size:14px;
  list-style:none;display:flex;justify-content:space-between;align-items:center;color:var(--ink)}
details.actions-d>summary::-webkit-details-marker{display:none}
details.actions-d>summary .chev{transition:.2s;color:var(--muted)}
details.actions-d[open]>summary .chev{transform:rotate(90deg)}
.checklist{list-style:none;margin:0;padding:4px 16px 16px}
.checklist li{display:flex;gap:11px;padding:7px 0;border-top:1px solid var(--border);font-size:14px;color:var(--ink)}
.checklist li:first-child{border-top:none}
.checklist input{margin-top:3px;flex:0 0 auto;width:16px;height:16px;accent-color:var(--primary)}
.checklist label{cursor:pointer}

/* ---------- Forms / records ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600;color:var(--muted)}
.field input,.field textarea,.field select{font-family:inherit;font-size:15px;color:var(--ink);
  background:var(--surface);border:1px solid var(--border-strong);border-radius:9px;padding:10px 12px;width:100%}
.field textarea{min-height:120px;resize:vertical;line-height:1.5}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{border:none;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn.primary{background:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-ink)}
.btn.ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--border-strong)}
.saved-note{font-size:13px;color:var(--good);opacity:0;transition:.3s}
.saved-note.show{opacity:1}
.imguploads{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:14px}
.imgtile{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--surface-2);position:relative}
.imgtile img{width:100%;height:120px;object-fit:cover;display:block}
.imgtile .cap{padding:7px 9px;font-size:12px;color:var(--muted);line-height:1.3}
.imgtile .del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;
  width:24px;height:24px;border-radius:7px;cursor:pointer;font-size:13px}
.dropzone{border:2px dashed var(--border-strong);border-radius:12px;padding:26px;text-align:center;
  color:var(--muted);cursor:pointer;background:var(--surface-2);transition:.15s}
.dropzone:hover{border-color:var(--primary);color:var(--primary-ink)}

/* ---------- Vitals ---------- */
.vitgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.vit{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.vit .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600}
.vit .val{font-family:var(--serif);font-size:30px;margin-top:3px;font-variant-numeric:tabular-nums}
.vit .val small{font-size:14px;color:var(--muted)}

/* ---------- Database groups ---------- */
.db-group{margin-top:18px}
.db-group h3{font-size:18px;display:flex;align-items:center;gap:9px}
.db-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.db-chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border-strong);
  background:var(--surface);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:500;color:var(--ink)}
.db-chip:hover{border-color:var(--primary);color:var(--primary-ink);text-decoration:none}
.db-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.tokens{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.token{font-size:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;
  padding:3px 9px;color:var(--muted)}

/* ---------- Callouts ---------- */
.callout{border-radius:12px;padding:16px 18px;font-size:14.5px;line-height:1.55;border:1px solid transparent}
.callout.warn{background:var(--warn-soft);border-color:color-mix(in srgb,var(--warn) 30%,transparent);color:var(--ink)}
.callout.info{background:var(--primary-soft);border-color:color-mix(in srgb,var(--primary) 30%,transparent);color:var(--ink)}
.callout strong{font-family:var(--serif)}
.step{display:flex;gap:14px;padding:14px 0;border-top:1px solid var(--border)}
.step:first-child{border-top:none}
.step .n{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--accent-soft);
  color:var(--accent);font-weight:700;display:grid;place-items:center;font-family:var(--serif)}
.step .n.done{background:var(--good-soft);color:var(--good)}
.step h4{font-size:16px;margin-bottom:3px}
.step p{margin:0;color:var(--muted);font-size:14px}
.reflist{margin:0;padding-left:20px;color:var(--muted);font-size:14px;line-height:1.7}
.reflist li{margin:5px 0}
.footer{margin-top:40px;padding-top:22px;border-top:1px solid var(--border);color:var(--faint);font-size:13px}
.qrbox{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.qrbox img{width:150px;height:150px;border-radius:12px;border:1px solid var(--border);background:#fff;padding:8px}

@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .topbar{display:flex}
  .sidebar{position:fixed;left:0;top:0;z-index:50;width:280px;transform:translateX(-100%);
    transition:transform .22s ease}
  .sidebar.open{transform:none}
  .scrim.show{display:block}
  .main{padding:22px 18px 80px}
  .row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="scrim" id="scrim"></div>
<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="brand">
      <div class="mark">S</div>
      <div class="who"><strong>Scott M.'s</strong>Prostate Health Guide</div>
    </div>
    <div id="nav"></div>
    <div class="theme-toggle">
      <span>Appearance</span>
      <button class="tbtn" id="themeBtn">Auto</button>
    </div>
  </nav>

  <div>
    <div class="topbar">
      <button class="hamb" id="hamb" aria-label="Open menu">☰</button>
      <strong style="font-family:var(--serif)">Scott M.'s Prostate Health Guide</strong>
    </div>
    <main class="main" id="main"></main>
  </div>
</div>

<script>
/* ============================================================
   Scott M.'s Prostate Health Guide  —  single-file app
   Educational only. Not medical advice. Data stays on device.
   ============================================================ */

/* ---------- Reference content (data-driven) ----------
   Each item: name, tag, text (plain, with an 8th-grade metaphor).
   The "Listen" button reads `text` aloud via the browser's speech engine. */

const DRUGS = {
  intro:"Common medicines used in prostate cancer care, grouped by what they do. Which ones fit Scott depends on his stage, genes, and his oncologist's plan.",
  items:[
    {name:"Leuprolide (Lupron)", tag:"Hormone therapy · LHRH agonist",
     text:"Prostate cancer often grows on testosterone, like a fire feeding on wood. Leuprolide tells the body's control center to stop shipping that wood. After a short early flare, testosterone drops and the fire loses its fuel."},
    {name:"Degarelix (Firmagon)", tag:"Hormone therapy · GnRH antagonist",
     text:"This one also cuts off the testosterone fuel supply, but it does it right away, like flipping a switch off instead of slowly turning a dial. Because of that, it skips the early flare-up that some other hormone shots cause."},
    {name:"Bicalutamide (Casodex)", tag:"Anti-androgen",
     text:"Testosterone works by plugging into 'sockets' on cancer cells. Bicalutamide is like a plastic safety cap pushed into those sockets, so testosterone can't plug in and switch the cell on."},
    {name:"Enzalutamide (Xtandi)", tag:"Androgen-receptor inhibitor",
     text:"A stronger, smarter socket-blocker. It not only caps the socket but also stops it from moving into the cell's control room to give orders. Used when cancer keeps growing even with low testosterone."},
    {name:"Apalutamide (Erleada)", tag:"Androgen-receptor inhibitor",
     text:"A cousin of enzalutamide that jams the same testosterone sockets. It's often used earlier, to keep quiet cancer from waking up and spreading."},
    {name:"Darolutamide (Nubeqa)", tag:"Androgen-receptor inhibitor",
     text:"Another socket-blocker built to mostly stay out of the brain, which can mean fewer thinking-and-mood side effects for some men. It's chosen to delay cancer spreading."},
    {name:"Abiraterone (Zytiga)", tag:"CYP17 inhibitor",
     text:"Testosterone is made in more than one factory, not just the testicles. Abiraterone shuts down the hidden backup factories — including ones inside the tumor itself — so almost no fuel gets made anywhere."},
    {name:"Docetaxel (Taxotere)", tag:"Chemotherapy",
     text:"Cells copy themselves by pulling apart on tiny 'ropes.' Docetaxel freezes those ropes stiff so fast-dividing cancer cells can't split, and they die. It travels the whole body, so it also causes broader side effects."},
    {name:"Cabazitaxel (Jevtana)", tag:"Chemotherapy",
     text:"A backup rope-freezing chemo used when docetaxel stops working. Some tumors learn to pump docetaxel out like bouncers at a door; cabazitaxel slips past those bouncers."},
    {name:"Abiraterone + prednisone", tag:"Combination",
     text:"Shutting off all the testosterone factories can throw other hormones out of balance, like turning off one machine and flooding the room. A small steroid, prednisone, is added to mop up that flood."},
    {name:"Olaparib (Lynparza)", tag:"PARP inhibitor · targeted",
     text:"Cells fix broken DNA with repair crews. Some tumors (with BRCA-type mutations) have already lost one crew. Olaparib benches the backup crew too, so the cancer's DNA damage piles up until the cell collapses."},
    {name:"Rucaparib (Rubraca)", tag:"PARP inhibitor · targeted",
     text:"Works like olaparib — it takes away the tumor's second repair crew. It's used for cancers with certain DNA-repair gene changes, so genetic testing helps decide if it fits."},
    {name:"Sipuleucel-T (Provenge)", tag:"Immunotherapy · vaccine",
     text:"This treatment takes Scott's own immune 'soldiers' out, shows them a wanted-poster of the cancer, trains them, and puts them back. Now they recognize the tumor and attack it."},
    {name:"Pembrolizumab (Keytruda)", tag:"Immunotherapy · checkpoint",
     text:"Cancer can wave a fake 'friendly' flag that tells immune cells to stand down. Pembrolizumab tears that flag away so the immune system sees the enemy. It mainly helps tumors with specific DNA-repair flaws (MSI-high)."},
    {name:"Radium-223 (Xofigo)", tag:"Radiopharmaceutical",
     text:"Prostate cancer often moves into bone. Radium-223 looks like calcium, so bone soaks it up right where the cancer is hiding — then it releases a tiny, very short-range spark of radiation that burns only the nearby tumor."},
    {name:"Lutetium-177 PSMA (Pluvicto)", tag:"Radioligand therapy",
     text:"Prostate cells wear a specific badge called PSMA. This medicine is a homing missile: one end locks onto the PSMA badge, and the other end carries a tiny radioactive payload that destroys the cell it's stuck to."},
  ],
  actions:[
    "Ask which category (hormone, chemo, targeted, immune, radiopharmaceutical) fits Scott's current stage.",
    "Request the specific goal of each drug: cure, control, slow spread, or ease symptoms.",
    "Ask for the most common and the most serious side effects, in plain language.",
    "Confirm whether genetic testing (BRCA, ATM, MSI) is needed before targeted or immune drugs.",
    "Get the schedule: pills daily, shots every few months, or infusions — and for how long.",
    "Ask how each drug will be monitored (PSA, scans, blood tests) and how often.",
    "Bring a full list of Scott's current medicines and supplements to check for interactions.",
    "Ask about bone health (calcium, vitamin D, bone-strengthening drugs) with hormone therapy.",
    "Ask what to do and who to call if a side effect appears at home.",
    "Request the cost/insurance path and whether patient-assistance programs exist.",
    "Ask whether a clinical trial offers a newer option for Scott's situation.",
    "Confirm which symptoms mean 'go to the ER' versus 'call the clinic.'",
  ]
};

const TREATMENTS = {
  intro:"Broad approaches a care team may combine. The right plan depends on Scott's Gleason/grade group, stage, PSA, genes, age, and personal priorities.",
  items:[
    {name:"Active surveillance", tag:"Monitoring",
     text:"For slow, low-risk cancer, this is like keeping a close eye on a small, calm campfire instead of dumping water on it. Regular PSA tests, scans, and biopsies watch for any change, and treatment starts only if it wakes up."},
    {name:"Watchful waiting", tag:"Monitoring",
     text:"A lighter-touch watch, usually for men where the cancer is unlikely to cause trouble in their lifetime. The focus is comfort and quality of life, treating symptoms only if they appear."},
    {name:"Radical prostatectomy", tag:"Surgery",
     text:"Surgeons remove the whole prostate, like taking out a factory that's making trouble. Often done with robot-assisted tools through small cuts for a faster recovery."},
    {name:"External beam radiation (EBRT)", tag:"Radiation",
     text:"Invisible beams aimed from outside the body, like sunlight through a magnifying glass focused on the tumor to burn it while sparing the skin around it."},
    {name:"Brachytherapy", tag:"Radiation",
     text:"Tiny radioactive 'seeds' are placed right inside the prostate, like putting a space heater in the exact cold room instead of heating the whole house. The radiation stays very local."},
    {name:"Androgen deprivation therapy (ADT)", tag:"Hormone therapy",
     text:"Lowering testosterone starves the cancer of its main fuel. Often paired with radiation to make the beams work better, like turning down a fire before hosing it down."},
    {name:"ADT + androgen-receptor drug (ARPI)", tag:"Combination",
     text:"Cut off the fuel and block the sockets at the same time. Using both together hits the cancer from two directions and, for advanced disease, helps men live longer than one alone."},
    {name:"Chemotherapy + ADT", tag:"Combination",

/* ---------- Personalization engine ----------
   Reads what's typed into the diagnosis/history fields and highlights the most
   relevant sections. Purely keyword-based on the user's own text — educational,
   never a recommendation. Updates live as Scott's real report is entered. */
function analyzeProfile(){
  const gl=store.get('gleason','')||'', is=store.get('isup','')||'', st=store.get('stage','')||'';
  const txt=((store.get('dxSummary','')||'')+' '+st+' '+gl+' '+is+' '+(store.get('family','')||'')+' '+(store.get('meds','')||'')).toLowerCase();
  const flags=new Set(), genes=[];
  ['BRCA1','BRCA2','ATM','CHEK2','HOXB13','PALB2','TP53','PTEN','CDK12','MSH2','MSH6','MLH1']
    .forEach(g=>{if(new RegExp('\\b'+g+'\\b','i').test(txt))genes.push(g);});
  const brcaLike=genes.some(g=>['BRCA1','BRCA2','ATM','PALB2','CDK12'].includes(g));
  const lynch=genes.some(g=>['MSH2','MSH6','MLH1'].includes(g));
  if(/msi[-\s]?high|microsatellite|mismatch[-\s]repair|dmmr|mmr[-\s]deficien/i.test(txt)||lynch)flags.add('msi');
  let gsum=null; let m=gl.match(/(\d)\s*\+\s*(\d)/); if(m)gsum=+m[1]+ +m[2];
  if(gsum==null){m=gl.match(/(\d{1,2})\s*$/); if(m)gsum=+m[1];}
  const isup=parseInt((is.match(/[1-5]/)||[])[0]||'0',10);
  if(/gleason\s*(8|9|10)|[45]\s*\+\s*[45]|4\s*\+\s*4/i.test(txt)||gsum>=8||isup>=4)flags.add('high');
  else if(gsum===7||isup===2||isup===3||/gleason\s*7|3\s*\+\s*4|4\s*\+\s*3/i.test(txt))flags.add('intermediate');
  else if(gsum===6||isup===1||/gleason\s*6|3\s*\+\s*3/i.test(txt))flags.add('low');
  if(/metasta|\bm1\b|stage\s*(iv|4)|\bspread|bone (metas|lesion)|distant (metas|disease)/i.test(txt))flags.add('metastatic');
  if(/\bn1\b|lymph node|node[-\s]positive/i.test(txt))flags.add('node');
  if(/castrat\w*[-\s]resistant|crpc/i.test(txt))flags.add('crpc');
  if(/psma/i.test(txt))flags.add('psma');
  return {flags,genes,brcaLike,lynch,gsum,isup,hasData:txt.trim().length>3};
}
function personalizeHTML(){
  const p=analyzeProfile();
  if(!p.hasData || (p.flags.size===0 && p.genes.length===0)){
    return `<div class="card section-gap" style="border-style:dashed">
      <h3 style="font-size:19px;margin-bottom:6px">Personalize this guide</h3>
      <p style="color:var(--muted);font-size:14.5px;margin:0">Paste Scott's diagnosis in <a href="#biopsy">Biopsy &amp; diagnosis</a> (Gleason, ISUP, stage, and any gene results). This page will then automatically highlight the sections that matter most for his specific case.</p></div>`;
  }
  // detected chips
  let chips='';
  const gradeLbl = p.flags.has('high')?['High grade','crit']:p.flags.has('intermediate')?['Intermediate grade','warn']:p.flags.has('low')?['Low grade','good']:null;
  if(gradeLbl)chips+=`<span class="pill ${gradeLbl[1]}">${gradeLbl[0]}</span>`;
  if(p.flags.has('metastatic'))chips+=`<span class="pill crit">Possible spread noted</span>`;
  if(p.flags.has('node'))chips+=`<span class="pill warn">Lymph node mention</span>`;
  if(p.flags.has('crpc'))chips+=`<span class="pill warn">Castration-resistant</span>`;
  if(p.flags.has('msi'))chips+=`<span class="pill info">MSI / mismatch-repair</span>`;
  p.genes.forEach(g=>chips+=`<span class="pill info">${g}</span>`);
  // build focus cards
  const cards=[]; const seen=new Set();
  const add=(tag,title,why,href)=>{if(seen.has(title))return;seen.add(title);cards.push({tag,title,why,href});};
  if(p.brcaLike){add('Targeted therapy','PARP inhibitors may be relevant','A DNA-repair gene ('+p.genes.filter(g=>['BRCA1','BRCA2','ATM','PALB2','CDK12'].includes(g)).join(', ')+') was mentioned — ask whether a PARP inhibitor like olaparib fits.','#drugs');
    add('Genetics','Review the gene findings','Understand what the mentioned gene(s) mean for treatment and for family members.','#genes');
    add('Trials','BRCA-matched trials','Some trials specifically enroll men with DNA-repair mutations.','#trials');}
  if(p.flags.has('msi')){add('Immunotherapy','Immunotherapy may be an option','MSI-high / mismatch-repair signals can make checkpoint immunotherapy (pembrolizumab) effective — ask about it.','#drugs');
    add('Genetics','Lynch-syndrome genes','Ask about counseling — these findings affect relatives too.','#genes');}
  if(p.flags.has('metastatic')){add('Advanced disease','Systemic & bone-directed options','With possible spread, hormone therapy combinations and bone-targeted radiopharmaceuticals (radium-223, Pluvicto) become central.','#drugs');
    add('Radiation','PSMA-guided radiation','Ask whether PSMA imaging should guide treatment of spread.','#radiation');
    add('Trials','Metastatic trials','Platform trials like STAMPEDE2 focus on advanced disease.','#trials');}
  if(p.flags.has('crpc')){add('Next-line therapy','Beyond first hormone therapy','Castration-resistant disease needs a different class — AR inhibitors, chemo, PSMA radioligand, or a trial.','#drugs');}
  if(p.flags.has('high')){add('Treatment','Discuss intensive combinations','Higher-grade disease is often treated with combined approaches — compare surgery vs. radiation + hormone therapy.','#treatments');
    add('Radiation','Radiation planning','Review external-beam, brachytherapy, and combined options.','#radiation');}
  if(p.flags.has('intermediate')){add('Treatment','Weigh the main options','Compare surgery, radiation, and (sometimes) surveillance for intermediate-risk disease.','#treatments');}
  if(p.flags.has('low')){add('Treatment','Active surveillance may fit','Low-grade cancer is often watched closely rather than treated right away — ask if it applies.','#treatments');
    add('Terms','Learn the monitoring terms','Understand PSA trends, nadir, and what would trigger treatment.','#terms');}
  // always-useful supportive care
  add('Supportive','Nutrition & exercise','Supportive habits that help through any treatment path.','#nutrition');
  let cardsHTML=cards.slice(0,8).map((c,i)=>`<a class="step" href="${c.href}" style="text-decoration:none;color:inherit">
    <div class="n">${i+1}</div><div><h4>${esc(c.title)}</h4><p><span style="color:var(--accent);font-weight:600">${esc(c.tag)}.</span> ${esc(c.why)}</p></div></a>`).join('');
  return `<div class="card section-gap" style="border-color:var(--primary)">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px">

    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${chips||'<span class="pill">—</span>'}</div>
    ${cardsHTML}

async function collectBackup(){
  const data={version:1, exported:new Date().toISOString(), local:{}, images:[]};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('phg_'))data.local[k]=localStorage.getItem(k);}
  const meta=store.get('images_meta',[]);
  for(const m of meta){const rec=await getImg(m.id);if(rec)data.images.push({meta:m,data:rec.data});}
  return data;
}
async function restoreBackup(data){
  if(!data||data.version!==1)throw new Error('This file is not a valid backup.');
  Object.entries(data.local||{}).forEach(([k,v])=>{if(k.startsWith('phg_'))localStorage.setItem(k,v);});
  for(const img of (data.images||[])){await putImg({id:img.meta.id,data:img.data});}
}

const main = document.getElementById('main');
const navEl = document.getElementById('nav');

// build nav

  g.items.forEach(it=>{

    b.addEventListener('click',()=>{location.hash=it.id;closeMenu()});

function setActive(id){
  document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
}

function render(){
  const id = (location.hash||'#home').slice(1);
  const valid = NAV.some(g=>g.items.some(i=>i.id===id));
  const useId = valid?id:'home';
  main.innerHTML = `<div class="view active">${buildView(useId)}</div>`;
  setActive(useId);
  window.speechSynthesis && window.speechSynthesis.cancel();
  wireView(useId);
  injectQR();
  main.scrollTop=0; window.scrollTo(0,0);
}

/* ---- speech ---- */
let curBtn=null;
function speak(text, btn){
  if(!('speechSynthesis' in window)){alert('This device/browser does not support built-in speech. Try Safari or Chrome.');return;}
  const synth=window.speechSynthesis;
  if(curBtn===btn && synth.speaking){synth.cancel();stopBtn();return;}
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.96; u.pitch=1;
  const vs=synth.getVoices();
  const pref=vs.find(v=>/en-US|en_GB|en-GB/.test(v.lang)&&/female|Samantha|Karen|Zira|Google US/i.test(v.name))||vs.find(v=>/^en/i.test(v.lang));
  if(pref)u.voice=pref;
  u.onend=stopBtn; u.onerror=stopBtn;
  curBtn=btn; btn.classList.add('speaking');
  setBtnLabel(btn,'Stop');
  synth.speak(u);
}
function stopBtn(){ if(curBtn){curBtn.classList.remove('speaking');setBtnLabel(curBtn,'Listen');curBtn=null;} }
function setBtnLabel(btn,txt){
  // keep the wave span, replace trailing text
  const wave=btn.querySelector('.wave');
  btn.innerHTML=''; btn.appendChild(wave); btn.appendChild(document.createTextNode(' '+txt));
}

function wireView(id){
  // Listen buttons
  main.querySelectorAll('.listen').forEach(btn=>{
    btn.addEventListener('click',()=>{const t=SAY[btn.dataset.say];if(t)speak(t,btn);});
  });
  // persisted checkboxes
  main.querySelectorAll('input[data-persist]').forEach(cb=>{
    cb.checked=!!store.get(cb.dataset.persist,false);
    cb.addEventListener('change',()=>store.set(cb.dataset.persist,cb.checked));
  });
  // auto-save text fields
  main.querySelectorAll('[data-save]').forEach(el=>{
    const k=el.dataset.save; const v=store.get(k,'');
    if(v!==''&&v!=null) el.value=v;
    el.addEventListener('input',()=>store.set(k,el.value));
  });
  // explicit save buttons -> flash note
  [['saveBiopsy','biopsySaved'],['saveHistory','historySaved'],['saveVitals','vitalsSaved']].forEach(([b,n])=>{
    const bt=document.getElementById(b); if(bt)bt.addEventListener('click',()=>{
      const note=document.getElementById(n); if(note){note.classList.add('show');setTimeout(()=>note.classList.remove('show'),1600);}
    });
  });
  if(id==='images') wireImages();
  if(id==='vitals') wireVitals();
  if(id==='backup') wireBackup();
}

function flashNote(el,msg,ok){if(!el)return;el.textContent=msg;el.style.color=ok===false?'var(--crit)':'var(--good)';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}

function wireBackup(){
  const note=document.getElementById('backupNote');
  document.getElementById('exportBtn').addEventListener('click',async()=>{
    const data=await collectBackup();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='scott-prostate-guide-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    flashNote(note,'Backup downloaded ✓');
  });
  document.getElementById('importInput').addEventListener('change',async e=>{
    const f=e.target.files[0]; if(!f)return;
    try{const data=JSON.parse(await f.text()); await restoreBackup(data);
      flashNote(note,'Backup restored ✓ Reloading…');
      setTimeout(()=>location.reload(),900);
    }catch(err){flashNote(note,'Could not restore: '+err.message,false);}
    e.target.value='';
  });
  document.getElementById('printBtn').addEventListener('click',printSummary);
  document.getElementById('wipeBtn').addEventListener('click',async()=>{
    if(!confirm('Erase ALL data on this device? This cannot be undone. Make sure you exported a backup first.'))return;
    const keys=[]; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('phg_'))keys.push(k);}
    keys.forEach(k=>localStorage.removeItem(k));
    for(const m of (store.get('images_meta',[])||[])){await delImg(m.id);}
    flashNote(note,'All data erased. Reloading…'); setTimeout(()=>location.reload(),900);
  });
}

function printSummary(){
  const g=k=>store.get(k,'')||'—';
  const name=store.get('patientName','Scott M.')||'Scott M.';
  const checked=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('phg_chk-')&&localStorage.getItem(k)==='true')checked.push(k);}
  // map checked keys back to action text
  const ALL={drugs:DRUGS,treatments:TREATMENTS,radiation:RADIATION,nutrition:NUTRITION,supplements:SUPPLEMENTS,surgery:SURGERY,genes:GENES,terms:TERMS,trials:TRIALS};
  const qs=[];
  checked.forEach(k=>{const m=k.match(/^phg_chk-(.+)-(\d+)$/);if(m&&ALL[m[1]]&&ALL[m[1]].actions[m[2]])qs.push(ALL[m[1]].actions[m[2]]);});
  const log=store.get('psaLog',[]);
  const esc2=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

/* ---- images via IndexedDB ---- */
let db=null;
function openDB(){return new Promise(res=>{
  if(db)return res(db);
  const r=indexedDB.open('phg_images',1);
  r.onupgradeneeded=e=>{e.target.result.createObjectStore('imgs',{keyPath:'id'})};
  r.onsuccess=e=>{db=e.target.result;res(db)};
  r.onerror=()=>res(null);
});}
async function putImg(rec){const d=await openDB();if(!d)return;return new Promise(r=>{const t=d.transaction('imgs','readwrite');t.objectStore('imgs').put(rec);t.oncomplete=()=>r();});}
async function getImg(id){const d=await openDB();if(!d)return null;return new Promise(r=>{const req=d.transaction('imgs').objectStore('imgs').get(id);req.onsuccess=()=>r(req.result);});}
async function delImg(id){const d=await openDB();if(!d)return;return new Promise(r=>{const t=d.transaction('imgs','readwrite');t.objectStore('imgs').delete(id);t.oncomplete=()=>r();});}

function wireImages(){
  const input=document.getElementById('imgInput');
  const dz=document.getElementById('dropzone');
  const gal=document.getElementById('imgGallery');
  const noteEl=document.getElementById('imgNote');
  renderGallery();
  input.addEventListener('change',async e=>{
    const files=[...e.target.files];
    for(const f of files){
      if(!f.type.startsWith('image/'))continue;
      const dataUrl=await fileToDataURL(f);
      const id='img_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      await putImg({id,data:dataUrl});
      const meta=store.get('images_meta',[]);
      meta.unshift({id,note:noteEl.value||f.name,date:new Date().toISOString().slice(0,10)});
      store.set('images_meta',meta);
    }
    noteEl.value=''; input.value=''; renderGallery();
  });
  async function renderGallery(){
    const meta=store.get('images_meta',[]);
    gal.innerHTML='';
    for(const m of meta){
      const rec=await getImg(m.id);
      const tile=document.createElement('div'); tile.className='imgtile';
      tile.innerHTML=`<img src="${rec?rec.data:''}" alt="${esc(m.note)}"><div class="cap">${esc(m.note)}<br><span style="opacity:.7">${esc(m.date)}</span></div><button class="del" title="Delete" aria-label="Delete image">✕</button>`;
      tile.querySelector('.del').addEventListener('click',async()=>{
        await delImg(m.id);
        store.set('images_meta',store.get('images_meta',[]).filter(x=>x.id!==m.id));
        renderGallery();
      });
      gal.appendChild(tile);
    }
    if(meta.length===0)gal.innerHTML='<p style="color:var(--faint);font-size:14px">No images yet.</p>';
  }
}
function fileToDataURL(f){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f);});}

function wireVitals(){
  const list=document.getElementById('logList');
  render();
  document.getElementById('addLog').addEventListener('click',()=>{
    const d=document.getElementById('logDate').value, p=document.getElementById('logPsa').value, n=document.getElementById('logNote').value;
    if(!d&&!p&&!n)return;
    const log=store.get('psaLog',[]); log.unshift({d,p,n}); store.set('psaLog',log);
    document.getElementById('logDate').value='';document.getElementById('logPsa').value='';document.getElementById('logNote').value='';
    render();
  });
  function render(){
    const log=store.get('psaLog',[]);
    if(!log.length){list.innerHTML='<p style="color:var(--faint);font-size:14px">No entries yet.</p>';return;}
    list.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:14px"><thead><tr style="text-align:left;color:var(--faint)"><th style="padding:6px 8px">Date</th><th>PSA</th><th>Note</th><th></th></tr></thead><tbody>'+
      log.map((e,i)=>`<tr style="border-top:1px solid var(--border)"><td style="padding:8px 8px;font-variant-numeric:tabular-nums">${esc(e.d||'—')}</td><td style="font-variant-numeric:tabular-nums">${esc(e.p||'—')}</td><td style="color:var(--muted)">${esc(e.n||'')}</td><td><button class="del" data-i="${i}" style="position:static;background:none;color:var(--crit);border:none;cursor:pointer">✕</button></td></tr>`).join('')+
      '</tbody></table>';
    list.querySelectorAll('.del').forEach(b=>b.addEventListener('click',()=>{
      const log=store.get('psaLog',[]); log.splice(+b.dataset.i,1); store.set('psaLog',log); render();
    }));
  }
}

/* ---- theme toggle ---- */
const themeBtn=document.getElementById('themeBtn');
let themeMode=store.get('theme','auto');
function applyTheme(){
  const root=document.documentElement;
  if(themeMode==='auto'){root.removeAttribute('data-theme');themeBtn.textContent='Auto';}
  else{root.setAttribute('data-theme',themeMode);themeBtn.textContent=themeMode==='dark'?'Dark':'Light';}
}
themeBtn.addEventListener('click',()=>{
  themeMode = themeMode==='auto'?'light':themeMode==='light'?'dark':'auto';
  store.set('theme',themeMode); applyTheme();
});
applyTheme();
