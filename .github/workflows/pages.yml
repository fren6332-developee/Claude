name: Deploy game to GitHub Pages

# Publishes the game so it is instantly playable at a public URL.
# One-time setup: in the repo, go to Settings -> Pages -> "Build and
# deployment" -> Source: "GitHub Actions". After that, every push that
# touches the game redeploys automatically.

on:
  push:
    branches:
      - main
      - claude/zelda-2d-game-prototype-e66bni
      - claude/fzero-racing-game-s2qbfb
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
